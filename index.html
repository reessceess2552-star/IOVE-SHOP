<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>IOVE SHOP</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* header */
header {
  padding: 20px;
  font-size: 28px;
  background: rgba(255,105,180,0.6);
}

/* ตัวอนิเมะ */
.anime {
  width: 120px;
  margin-top: 10px;
}

/* กล่อง */
.box {
  margin: 20px;
  padding: 20px;
  background: rgba(0,0,0,0.5);
  border-radius: 20px;
}

/* ปุ่ม */
button {
  padding: 10px 20px;
  background: hotpink;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

/* สินค้า */
.item {
  background: rgba(255,255,255,0.1);
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}
</style>

</head>
<body>

<header>💖 IOVE SHOP 💖</header>

<!-- ตัวอนิเมะ -->
<img class="anime" src="https://i.imgur.com/6X12UGp.png">

<!-- ล็อกอิน -->
<div class="box">
  <h2>🔐 เข้าสู่ระบบ</h2>
  <button onclick="login()">ล็อกอินด้วย Google</button>
  <p id="user"></p>
</div>

<!-- สินค้า -->
<div class="box">
  <h2>🛒 สินค้า</h2>

  <div class="item">
    💎 50 บาท
    <br><button>ซื้อ</button>
  </div>

  <div class="item">
    💎 100 บาท
    <br><button>ซื้อ</button>
  </div>

</div>

<script>
// 🔥 ใส่ Firebase ของมึงตรงนี้
const firebaseConfig = {
  apiKey: "ใส่ของมึง",
  authDomain: "ใส่ของมึง",
  projectId: "ใส่ของมึง",
};

// init
firebase.initializeApp(firebaseConfig);

// login
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
  .then(result => {
    document.getElementById("user").innerText = "👤 " + result.user.displayName;
  });
}
</script>

</body>
</html>
