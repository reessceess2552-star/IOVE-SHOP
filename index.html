<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>IOVE SHOP</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#ff9acb,#ff69b4);
  text-align:center;
}

header {
  color:white;
  padding:20px;
  font-size:30px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#ff69b4;
  color:white;
  padding:15px;
  border-radius:15px;
  cursor:pointer;
}

.vip { background:gold; color:black; }

input, button {
  padding:12px;
  margin:5px;
  width:85%;
  border:none;
  border-radius:10px;
}

button { color:white; }

.adminPanel {
  display:none;
  background:white;
  padding:15px;
  border-radius:15px;
  margin:20px;
}

.heart {
  position:fixed;
  animation:fall linear infinite;
}

@keyframes fall {
  to { transform:translateY(100vh);}
}
</style>
</head>

<body>

<header onclick="openAdmin()">💖 IOVE SHOP 💖 (กด 5 ครั้งเข้าแอดมิน)</header>

<button style="background:#4285F4;" onclick="login()">🔐 ล็อกอิน Google</button>
<button style="background:#999;" onclick="logout()">🚪 ออก</button>

<h2>🔥 เติมเกม Free Fire</h2>

<input id="uid" placeholder="กรอก UID">

<div class="grid">
<div class="card" onclick="selectPack(25,68)">68💎<br>25฿</div>
<div class="card" onclick="selectPack(49,172)">172💎<br>49฿</div>
<div class="card" onclick="selectPack(88,310)">310💎<br>88฿</div>
<div class="card" onclick="selectPack(98,344)">344💎<br>98฿</div>
<div class="card" onclick="selectPack(146,517)">517💎<br>146฿</div>
<div class="card" onclick="selectPack(195,690)">690💎<br>195฿</div>
<div class="card vip" onclick="selectPack(2900,11094)">🔥11094💎<br>2900฿</div>
</div>

<h3>💳 สแกนจ่าย</h3>
<img src="QR.png" width="200">

<button style="background:hotpink;" onclick="sendFF()">📩 ส่งรายการ</button>

<div style="background:white;padding:15px;border-radius:15px;margin:15px;">
  <h3>📞 ติดต่อร้าน</h3>
  <a href="https://line.me/ti/p/@supakorn22552" target="_blank">
    <button style="background:#06c755;">💚 แอด LINE</button>
  </a>
  <a href="https://line.me/R/ti/p/@supakorn22552" target="_blank">
    <button style="background:#00b900;">💬 แชท</button>
  </a>
</div>

<!-- ADMIN -->
<div class="adminPanel" id="admin">
<h2>🛠️ หลังบ้าน</h2>
<h3>💸 ยอดรวม: <span id="total">0</span> บาท</h3>
<div id="orders"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ใส่ของมึง",
  authDomain: "ใส่ของมึง",
  projectId: "ใส่ของมึง"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  let provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}
function logout(){ auth.signOut(); }

/* SELECT PACK */
let selectedPrice=0, selectedDiamond=0;
function selectPack(p,d){
  selectedPrice=p;
  selectedDiamond=d;
  alert(`เลือก ${d}💎 ราคา ${p}`);
}

/* SEND ORDER */
function sendFF(){
  let uid=document.getElementById("uid").value;
  let user=auth.currentUser;

  if(!uid||selectedPrice==0) return alert("กรอกให้ครบ");
  if(!user) return alert("ล็อกอินก่อน");

  db.collection("orders").add({
    uid,
    diamond:selectedDiamond,
    price:selectedPrice,
    email:user.email,
    status:"pending",
    time:new Date()
  });

  sendLine(`🔥 ออเดอร์ใหม่ UID:${uid} 💎${selectedDiamond} 💰${selectedPrice}`);

  alert("ส่งรายการสำเร็จ!");
}

/* LINE */
function sendLine(msg){
  fetch("https://notify-api.line.me/api/notify",{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded",
      "Authorization":"Bearer ใส่TOKEN"
    },
    body:"message="+encodeURIComponent(msg)
  });
}

/* ADMIN */
let tap=0;
function openAdmin(){
  tap++;
  if(tap>=5){
    document.getElementById("admin").style.display="block";

    db.collection("orders").orderBy("time","desc")
    .onSnapshot(snap=>{
      let html="";
      let total=0;

      snap.forEach(doc=>{
        let d=doc.data();
        let status=d.status||"pending";

        if(status=="done") total+=d.price;

        let color = status=="done" ? "green" : status=="cancel" ? "red" : "orange";

        html+=`
        <div style="background:white;padding:10px;margin:10px;border-radius:10px;">
        UID:${d.uid} 💎${d.diamond} 💰${d.price}<br>
        👤 ${d.email}<br>

        <b style="color:${color};">สถานะ: ${status}</b><br><br>

        <button onclick="updateStatus('${doc.id}','done')" style="background:green;">✅ อนุมัติ</button>
        <button onclick="updateStatus('${doc.id}','cancel')" style="background:red;">❌ ยกเลิก</button>
        </div>
        `;
      });

      document.getElementById("orders").innerHTML=html;
      document.getElementById("total").innerText=total;
    });
  }
}

function updateStatus(id,status){
  db.collection("orders").doc(id).update({
    status:status
  });

  sendLine(`📢 ออเดอร์ ${id} → ${status}`);
}

/* HEART EFFECT */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="💖";
  h.style.left=Math.random()*100+"%";
  h.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
<script>
function sendLine(msg){
  fetch("https://notify-api.line.me/api/notify", {
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded",
      "Authorization":"Bearer ใส่_TOKEN_มึง"
    },
    body:"message="+encodeURIComponent(msg)
  });
}
</script>
