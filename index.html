<!DOCTYPE html>
<html lang="th">
<head>

  <title>IOVE SHOP</title>

    }
    header {
      padding: 20px;

    button {
      background: #ff3c3c;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>🔥 IOVE SHOP 🔥</header>

<div class="container">

    <h2>💎 เติมเกม</h2>

    <button>สั่งซื้อ</button>
  </div>

  <div class="card">
    <h2>📞 ติดต่อ</h2>
    <p>LINE: yourlineid</p>
    <button>แอดไลน์</button>
  </div>

</div>

</body>
</html>
